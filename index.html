      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 1;
      opacity: 0.35;
    }

    .hero {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 24px;
    }

    .deco-line {
      width: 1px;
      background: linear-gradient(to bottom, transparent, var(--gold), transparent);
      position: absolute;
      top: 0; bottom: 0;
      opacity: 0.15;
    }
    .deco-line.left  { left: 12%; }
    .deco-line.right { right: 12%; }

    /* CARD */
    .card {
      position: relative;
      background: rgba(10, 5, 5, 0.65);
      border: 1px solid rgba(184,150,46,0.3);
      max-width: 520px;
      width: 100%;
      padding: 64px 56px 56px;
      text-align: center;
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      animation: fadeUp 1.2s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .card::before {
      content: '';
      position: absolute;
      inset: -1px;
      background: linear-gradient(135deg, rgba(184,150,46,0.45), transparent 40%, rgba(107,26,42,0.35) 100%);
      z-index: -1;
      pointer-events: none;
    }

    .corner {
      position: absolute;
      width: 18px; height: 18px;
      border-color: var(--gold);
      border-style: solid;
      opacity: 0.55;
    }
    .corner.tl { top: -1px; left: -1px; border-width: 1px 0 0 1px; }
    .corner.tr { top: -1px; right: -1px; border-width: 1px 1px 0 0; }
    .corner.bl { bottom: -1px; left: -1px; border-width: 0 0 1px 1px; }
    .corner.br { bottom: -1px; right: -1px; border-width: 0 1px 1px 0; }

    .wordmark {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.4rem, 7vw, 3.6rem);
      font-weight: 300;
      letter-spacing: 0.35em;
      color: var(--gold-light);
      line-height: 1;
      animation: fadeUp 1.2s 0.1s cubic-bezier(0.22,1,0.36,1) both;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 24px auto;
      max-width: 280px;
      animation: fadeUp 1.2s 0.2s cubic-bezier(0.22,1,0.36,1) both;
    }
    .divider span { flex: 1; height: 1px; background: linear-gradient(to right, transparent, var(--gold-pale), transparent); }
    .divider i { width: 5px; height: 5px; background: var(--gold); transform: rotate(45deg); flex-shrink: 0; }

    .tagline {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(0.95rem, 2.5vw, 1.1rem);
      font-weight: 400;
      letter-spacing: 0.2em;
      color: var(--gold-pale);
      margin-bottom: 8px;
      animation: fadeUp 1.2s 0.25s cubic-bezier(0.22,1,0.36,1) both;
    }

    .subtitle {
      font-size: clamp(0.72rem, 2vw, 0.8rem);
      letter-spacing: 0.18em;
      color: rgba(250,246,238,0.4);
      margin-bottom: 40px;
      animation: fadeUp 1.2s 0.3s cubic-bezier(0.22,1,0.36,1) both;
    }

    .form { animation: fadeUp 1.2s 0.4s cubic-bezier(0.22,1,0.36,1) both; }

    .field { position: relative; margin-bottom: 16px; text-align: left; }

    .field label {
      display: block;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      color: var(--gold);
      margin-bottom: 6px;
      text-transform: uppercase;
    }

    .field input {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(184,150,46,0.25);
      color: var(--cream);
      font-family: 'Tenor Sans', sans-serif;
      font-size: 0.88rem;
      letter-spacing: 0.06em;
      padding: 13px 16px;
      outline: none;
      transition: border-color 0.3s, background 0.3s;
    }

    .field input::placeholder { color: rgba(250,246,238,0.22); }
    .field input:focus {
      border-color: rgba(184,150,46,0.7);
      background: rgba(184,150,46,0.06);
    }

    .btn {
      width: 100%;
      margin-top: 8px;
      padding: 16px;
      background: linear-gradient(135deg, var(--burgundy) 0%, var(--burgundy-light) 50%, var(--burgundy) 100%);
      background-size: 200% 100%;
      border: 1px solid rgba(184,150,46,0.4);
      color: var(--gold-pale);
      font-family: 'Tenor Sans', sans-serif;
      font-size: 0.72rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background-position 0.5s, border-color 0.3s, color 0.3s, transform 0.2s;
      position: relative;
      overflow: hidden;
    }

    .btn:hover {
      background-position: 100% 0;
      border-color: var(--gold);
      color: var(--gold-light);
      transform: translateY(-1px);
    }
    .btn:active { transform: translateY(0); }
    .btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(255,255,255,0.05), transparent);
      pointer-events: none;
    }

    .success {
      display: none;
      text-align: center;
      padding: 24px 0 8px;
      animation: fadeUp 0.6s cubic-bezier(0.22,1,0.36,1) both;
    }
    .success .check { font-size: 2rem; color: var(--gold); margin-bottom: 16px; }
    .success h3 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.4rem;
      font-weight: 300;
      letter-spacing: 0.2em;
      color: var(--gold-light);
      margin-bottom: 8px;
    }
    .success p { font-size: 0.78rem; letter-spacing: 0.12em; color: rgba(250,246,238,0.5); }

    .notice {
      margin-top: 28px;
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      color: rgba(250,246,238,0.22);
      line-height: 1.8;
      animation: fadeUp 1.2s 0.5s cubic-bezier(0.22,1,0.36,1) both;
    }

    footer {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 32px 24px;
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      color: rgba(250,246,238,0.12);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 500px) {
      .card { padding: 48px 28px 40px; }
      .deco-line { display: none; }
    }
  </style>
</head>
<body>

  <section class="hero">
    <div class="deco-line left"></div>
    <div class="deco-line right"></div>

    <div class="card">
      <div class="corner tl"></div>
      <div class="corner tr"></div>
      <div class="corner bl"></div>
      <div class="corner br"></div>

      <div class="wordmark">HAEKINS</div>

      <div class="divider"><span></span><i></i><span></span></div>

      <p class="tagline">Private Access Begins Soon</p>
      <p class="subtitle">Join the private list for early access</p>

      <div class="form" id="formWrap">
        <form id="haekins-form" novalidate>
          <div class="field">
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" placeholder="Your name" autocomplete="name" required/>
          </div>
          <div class="field">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" placeholder="your@email.com" autocomplete="email" required/>
          </div>
          <div class="field">
            <label for="phone">Contact Number</label>
            <input type="tel" id="phone" name="phone" placeholder="+1 000 000 0000" autocomplete="tel"/>
          </div>
          <button class="btn" type="submit">Request Private Access</button>
        </form>

        <div class="success" id="successMsg">
          <div class="check">◈</div>
          <h3>You're on the list.</h3>
          <p>We'll be in touch before doors open.</p>
        </div>
      </div>

      <p class="notice">
        By joining, you agree to receive exclusive updates from Haekins.<br>
        Your information is kept private and never shared.
      </p>
    </div>
  </section>

  <footer>© HAEKINS — ALL RIGHTS RESERVED</footer>

  <script>
    const form = document.getElementById('haekins-form');
    const successMsg = document.getElementById('successMsg');

    // Replace with your Tally or Google Apps Script endpoint
    const FORM_ENDPOINT = 'https://script.google.com/macros/s/AKfycbywoZ3kE5GtiLdgj1uhlBCfaPpPioAsZakX_yDR9ZYplypquibWF99vhig7_8jN22ri/exec';

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const name  = form.name.value.trim();
      const email = form.email.value.trim();
      const phone = form.phone.value.trim();

      if (!name || !email) { shake(form); return; }

      const btn = form.querySelector('.btn');
      btn.textContent = 'Requesting…';
      btn.disabled = true;

      try {
        await fetch(FORM_ENDPOINT, {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, phone })
        });

        form.style.display = 'none';
        successMsg.style.display = 'block';
      } catch (err) {
        btn.textContent = 'Request Private Access';
        btn.disabled = false;
        alert('Something went wrong. Please try again.');
      }
    });

    function shake(el) {
      el.animate([
        { transform: 'translateX(0)' },
        { transform: 'translateX(-6px)' },
        { transform: 'translateX(6px)' },
        { transform: 'translateX(-4px)' },
        { transform: 'translateX(0)' }
      ], { duration: 350, easing: 'ease-out' });
    }
  </script>
</body>
</html>
